# railway.toml
# ─────────────────────────────────────────────────────────────
# VitrineIA US – Railway deployment config
# ─────────────────────────────────────────────────────────────
[build]
builder = "NIXPACKS"

[deploy]
startCommand = "node src/index.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "vitrineia-us-api"
